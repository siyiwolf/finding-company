<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="400" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景：纯白 -->
  <rect width="400" height="200" fill="#FFFFFF"/>
  
  <!-- 简洁指南针圆环 -->
  <circle cx="70" cy="100" r="45" fill="none" stroke="#0f4c81" stroke-width="4"/>
  <circle cx="70" cy="100" r="38" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  
  <!-- 极简指针：动态箭头 -->
  <path d="M70 42 L86 100 L70 100 L54 100 Z" fill="#2563eb"/>
  <path d="M70 158 L86 100 L70 100 L54 100 Z" fill="#60a5fa" opacity="0.4"/>
  
  <!-- 中心点 -->
  <circle cx="70" cy="100" r="5" fill="#0f4c81"/>
  
  <!-- 动态弧线（运动轨迹感） -->
  <path d="M115 70 Q 160 70, 160 100" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="160" cy="100" r="3" fill="#60a5fa"/>
  
  <!-- 公司名称：Finding -->
  <text x="190" y="95" font-family="'Inter', 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="36" font-weight="700" fill="#0f4c81">Finding</text>
  
  <!-- 公司名称：Company -->
  <text x="190" y="125" font-family="'Inter', 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="20" fill="#64748b">Company</text>
  
  <!-- 标语：Make Life Easy -->
  <text x="190" y="150" font-family="'Inter', 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="14" fill="#94a3b8">Make Life Easy</text>
</svg>